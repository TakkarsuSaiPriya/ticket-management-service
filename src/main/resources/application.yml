server:
  port: 8081

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/ticketdb?useSSL=false&serverTimezone=UTC
    username: root
    password: 

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  artemis:
    mode: embedded
    embedded:
      enabled: true    # ← CHANGED: was true, set false to break Artemis for testing
      queues: ticket.events
      persistent: false

  jms:
    listener:
      acknowledge-mode: client
      session-transacted: true
      concurrency: 1
      max-concurrency: 1

logging:
  level:
    org.springframework.jms: DEBUG
    org.apache.activemq: DEBUG
    org.hibernate.SQL: DEBUG
    root: INFO

app:
  messaging:
    queue: ticket.events
    max-retries: 3
